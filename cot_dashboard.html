<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EUTHANASIA / LEDGER V6.2</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg-dark: #0b0e11;
            --panel-bg: #151921;
            --text-main: #d1d4dc;
            --accent-blue: #2962ff;
            --border-color: #2a2e39;
            --dealer-color: #3179f5;
            --asset-color: #00ff88;
            --lev-color: #bb00ff;
            --other-color: #ff9800;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: 260px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-title { font-size: 10px; color: #848e9c; text-transform: uppercase; letter-spacing: 1px; }

        /* Main Content */
        #main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chart-container {
            height: 65%;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        /* Таблица с фиксированным заголовком */
        #table-wrapper {
            height: 35%;
            overflow: auto;
            background: var(--panel-bg);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            text-align: right;
        }

        thead {
            position: sticky;
            top: 0;
            background: var(--panel-bg);
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        th {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            color: #848e9c;
            font-weight: 500;
        }

        td {
            padding: 8px 10px;
            border-bottom: 1px solid #1e222d;
        }

        .sticky-date {
            position: sticky;
            left: 0;
            background: var(--panel-bg);
            text-align: left;
            font-weight: bold;
            color: #fff;
        }

        /* Цветовые индикаторы для групп */
        .group-header-dealer { border-bottom: 2px solid var(--dealer-color); }
        .group-header-asset { border-bottom: 2px solid var(--asset-color); }
        .group-header-lev { border-bottom: 2px solid var(--lev-color); }

        .neg { color: #ff5252; }
        .pos { color: #00c853; }
        
        /* Градиенты для колонок изменений */
        .gradient-cell { font-weight: 500; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="section-title">EUTHANASIA / LEDGER</div>
    <div id="controls">
        <p style="font-size: 11px;">System Online: 2026</p>
    </div>
</div>

<div id="main-container">
    <div id="chart-container"></div>
    <div id="table-wrapper">
        <table id="cotTable">
            <thead>
                <tr>
                    <th class="sticky-date">DATE (MON)</th>
                    <th>OI</th>
                    <th colspan="3" class="group-header-dealer">DEALER / INTERMEDIARY</th>
                    <th colspan="3" class="group-header-asset">ASSET MGR / INST</th>
                    <th colspan="3" class="group-header-lev">LEVERAGED FUNDS</th>
                </tr>
                <tr>
                    <th class="sticky-date"></th>
                    <th>Total</th>
                    <th>Net</th><th>Long</th><th>Short</th>
                    <th>Net</th><th>Long</th><th>Short</th>
                    <th>Net</th><th>Long</th><th>Short</th>
                </tr>
            </thead>
            <tbody id="cotTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // 1. Конфигурация полей API (Traders in Financial Futures)
    const FIELD_MAP = {
        dealer: { long: 'dealer_positions_long_all', short: 'dealer_positions_short_all' },
        assetMgr: { long: 'asset_mgr_positions_long_all', short: 'asset_mgr_positions_short_all' },
        levFunds: { long: 'lev_money_positions_long_all', short: 'lev_money_positions_short_all' }
    };

    let cotData = [];

    // 2. Инициализация графика (базовая структура)
    const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
        layout: { backgroundColor: '#151921', textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        timeScale: { borderColor: '#2a2e39', timeVisible: true }
    });

    const lineSeries = chart.addLineSeries({ color: '#2962ff', lineWidth: 2 });

    // 3. Загрузка и обработка данных
    async function initDashboard() {
        try {
            // Замени URL на свой Google Apps Script
            const response = await fetch('ТВОЙ_APPS_SCRIPT_URL');
            const rawData = await response.json();
            
            cotData = processData(rawData);
            renderTable(cotData);
            renderChart(cotData);
        } catch (e) {
            console.error("Ошибка загрузки:", e);
        }
    }

    function processData(data) {
        return data.map(row => {
            // Логика смещения: COT выходит во вторник, но мы двигаем на понедельник для синхронизации
            const reportDate = new Date(row.report_date_as_yyyy_mm_dd);
            reportDate.setDate(reportDate.getDate() - 1); 
            const syncDate = reportDate.toISOString().split('T')[0];

            return {
                ...row,
                syncDate: syncDate,
                formattedDate: row.report_date_as_yyyy_mm_dd // Оригинал для таблицы
            };
        });
    }

    // 4. Отрисовка исправленной таблицы
    function renderTable(data) {
        const body = document.getElementById('cotTableBody');
        body.innerHTML = '';

        data.forEach(row => {
            const tr = document.createElement('tr');
            
            let html = `
                <td class="sticky-date">${row.formattedDate}</td>
                <td>${formatNum(row.open_interest_all)}</td>
            `;

            // Обрабатываем каждую группу
            Object.keys(FIELD_MAP).forEach(group => {
                const f = FIELD_MAP[group];
                const l = parseInt(row[f.long]) || 0;
                const s = parseInt(row[f.short]) || 0;
                const net = l - s;

                html += `
                    <td class="${net >= 0 ? 'pos' : 'neg'}">${formatNum(net)}</td>
                    <td>${formatNum(l)}</td>
                    <td>${formatNum(s)}</td>
                `;
            });

            tr.innerHTML = html;
            body.appendChild(tr);
        });
    }

    function renderChart(data) {
        const chartPoints = data.map(row => ({
            time: row.syncDate,
            value: parseInt(row[FIELD_MAP.dealer.long]) - parseInt(row[FIELD_MAP.dealer.short])
        })).sort((a, b) => a.time.localeCompare(b.time));

        lineSeries.setData(chartPoints);
    }

    function formatNum(n) {
        return new Intl.NumberFormat('ru-RU').format(n);
    }

    initDashboard();
</script>

</body>
</html>
