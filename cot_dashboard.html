<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COT Dashboard</title>
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap');
:root {
  --bg:#0b0d12; --bg2:#0f121a; --bg3:#161b25;
  --border:#1e2535; --text:#cbd5e1; --muted:#475569;
  --accent:#38bdf8; --green:#22c55e; --red:#f43f5e;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;overflow:hidden;}
#app{display:flex;flex-direction:column;width:100%;height:100%;}

/* HEADER */
#header{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:9px 18px;background:var(--bg2);border-bottom:1px solid var(--border);}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;}
.logo span{color:var(--accent);}
#hdr-status{font-size:10px;color:var(--muted);}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-right:5px;vertical-align:middle;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* TABS */
#tabs{flex:0 0 auto;display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 18px;}
.tab{padding:7px 16px;cursor:pointer;color:var(--muted);font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* MAIN */
#main{flex:1 1 0;min-height:0;display:flex;overflow:hidden;}

/* SIDEBAR */
#sidebar{flex:0 0 190px;background:var(--bg2);border-right:1px solid var(--border);padding:12px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
#sidebar.hidden{display:none;}
.s-section{display:flex;flex-direction:column;gap:5px;}
.s-lbl{font-family:'Syne',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);padding-bottom:4px;border-bottom:1px solid var(--border);}
.ctrl-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 7px;border-radius:3px;width:100%;cursor:pointer;outline:none;}
.ctrl-sel:focus{border-color:var(--accent);}
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;cursor:pointer;}
.tog-lbl{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);transition:color .15s;}
.tog-lbl.on{color:var(--text);}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.tog-sw{width:26px;height:13px;background:var(--border);border-radius:7px;position:relative;transition:background .2s;flex-shrink:0;}
.tog-sw::after{content:'';position:absolute;left:2px;top:1.5px;width:10px;height:10px;border-radius:50%;background:var(--muted);transition:all .2s;}
.tog-sw.on{background:rgba(56,189,248,.25);}
.tog-sw.on::after{left:14px;background:var(--accent);}

/* VIEWPORT */
#viewport{flex:1 1 0;min-width:0;position:relative;display:flex;}
.page{position:absolute;inset:0;display:none;flex-direction:column;}
.page.active{display:flex;}

/* CHART */
#page-chart{overflow:hidden;}
#panels-wrap{flex:1 1 0;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
.c-panel{position:relative;flex-shrink:0;overflow:hidden;}
.c-lbl{position:absolute;top:6px;left:8px;z-index:5;font-family:'Syne',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;pointer-events:none;}
.c-divider{flex:0 0 3px;background:var(--border);flex-shrink:0;}

/* LOADING */
#loading{position:absolute;inset:0;z-index:50;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-family:'Syne',sans-serif;font-size:11px;color:var(--muted);letter-spacing:.8px;}

/* TABLE */
#page-table{overflow:hidden;}
.tbl-scroll{flex:1 1 0;overflow:auto;padding:14px 18px;}
table{border-collapse:collapse;width:max-content;font-size:10.5px;}
thead tr:first-child th{position:sticky;top:0;z-index:6;}
thead tr:last-child  th{position:sticky;top:31px;z-index:5;}
.th-base{background:#0a0c11;color:var(--text);font-family:'Syne',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;padding:8px 11px;text-align:center;border:1px solid var(--border);}
.th-sticky{position:sticky;left:0;z-index:9!important;}
.th-cat{font-family:'Syne',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;padding:8px 10px;text-align:center;border:1px solid rgba(255,255,255,.04);}
.th-m{font-family:'Syne',sans-serif;font-size:7.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:5px 8px;text-align:center;border:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.4);white-space:nowrap;}
td{padding:5px 9px;text-align:right;border:1px solid var(--border);white-space:nowrap;font-variant-numeric:tabular-nums;color:var(--text);}
.td-date{text-align:center;position:sticky;left:0;z-index:2;background:#0a0c11;color:var(--muted);font-size:10px;border-right:2px solid var(--border);}
.td-dim{color:var(--muted);}
tr:nth-child(even) td{background:rgba(255,255,255,.013);}
tr:nth-child(even) .td-date{background:#0a0c11;}
tr:hover td{background:rgba(56,189,248,.04)!important;}
tr:hover .td-date{background:#0a0c11!important;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo">COT <span>/</span></div>
    <div id="hdr-status"><span class="dot"></span>Loading...</div>
  </div>
  <div id="tabs">
    <div class="tab active" data-page="chart">Chart</div>
    <div class="tab" data-page="table">Table</div>
  </div>
  <div id="main">
    <div id="sidebar">
      <div class="s-section">
        <div class="s-lbl">Price Chart</div>
        <select class="ctrl-sel" id="sel-type" onchange="renderCharts()">
          <option value="candle">Candlestick</option>
          <option value="line">Line</option>
        </select>
      </div>
      <div class="s-section">
        <div class="s-lbl">COT Metric</div>
        <select class="ctrl-sel" id="sel-metric" onchange="renderCharts()">
          <option value="net">Net (L − S)</option>
          <option value="chgNet">Chg Net</option>
          <option value="longs">Longs</option>
          <option value="shorts">Shorts</option>
        </select>
      </div>
      <div class="s-section" id="cat-toggles">
        <div class="s-lbl">Categories</div>
      </div>
      <div class="s-section">
        <div class="s-lbl">Extra</div>
        <div class="tog-row" onclick="toggleOI()">
          <div class="tog-lbl" id="tl-oi"><div class="cdot" style="background:#fbbf24"></div>Open Interest</div>
          <div class="tog-sw" id="ts-oi"></div>
        </div>
      </div>
    </div>
    <div id="viewport">
      <div id="loading">
        <div class="spinner"></div>
        <div class="load-txt" id="load-txt">Loading...</div>
      </div>
      <div class="page active" id="page-chart">
        <div id="panels-wrap"></div>
      </div>
      <div class="page" id="page-table">
        <div class="tbl-scroll"><div id="tbl"></div></div>
      </div>
    </div>
  </div>
</div>
<script>
// ════════════════════════════════════════
// CONFIG — точные названия полей CFTC API
// ════════════════════════════════════════
const POLYGON_KEY = 'M42LpG3a9LFDCvSo_0BTdVzV_iZiduL8';
const CFTC_URL    = 'https://publicreporting.cftc.gov/resource/gpe5-46if.json';
const WEEKS       = 52;

const CATS = {
  dealer:   { label:'Dealer',     color:'#3b82f6',
    pfxL:'dealer_positions_long_all',   pfxS:'dealer_positions_short_all',
    pfxCL:'change_in_dealer_long_all',  pfxCS:'change_in_dealer_short_all',
    pfxPL:'pct_of_oi_dealer_long_all',  pfxPS:'pct_of_oi_dealer_short_all',  active:true },
  assetmgr: { label:'Asset Mgr',  color:'#22c55e',
    pfxL:'asset_mgr_positions_long',    pfxS:'asset_mgr_positions_short',
    pfxCL:'change_in_asset_mgr_long',   pfxCS:'change_in_asset_mgr_short',
    pfxPL:'pct_of_oi_asset_mgr_long',   pfxPS:'pct_of_oi_asset_mgr_short',   active:true },
  levfunds: { label:'Lev Funds',  color:'#a855f7',
    pfxL:'lev_money_positions_long',    pfxS:'lev_money_positions_short',
    pfxCL:'change_in_lev_money_long',   pfxCS:'change_in_lev_money_short',
    pfxPL:'pct_of_oi_lev_money_long',   pfxPS:'pct_of_oi_lev_money_short',   active:true },
  other:    { label:'Other Rept', color:'#f97316',
    pfxL:'other_rept_positions_long',   pfxS:'other_rept_positions_short',
    pfxCL:'change_in_other_rept_long',  pfxCS:'change_in_other_rept_short',
    pfxPL:'pct_of_oi_other_rept_long',  pfxPS:'pct_of_oi_other_rept_short',  active:false },
  nonrept:  { label:'Non-Rept',   color:'#94a3b8',
    pfxL:'nonrept_positions_long_all',  pfxS:'nonrept_positions_short_all',
    pfxCL:'change_in_nonrept_long_all', pfxCS:'change_in_nonrept_short_all',
    pfxPL:'pct_of_oi_nonrept_long_all', pfxPS:'pct_of_oi_nonrept_short_all', active:false },
};

const CAT_THCOL = { dealer:'#1565C0', assetmgr:'#2E7D32', levfunds:'#6A1B9A', other:'#B71C1C', nonrept:'#37474F' };
const CAT_LABEL = { dealer:'DEALER / INTERMEDIARY', assetmgr:'ASSET MANAGER / INSTITUTIONAL', levfunds:'LEVERAGED FUNDS', other:'OTHER REPORTABLE', nonrept:'NON-REPORTABLE' };

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let cotData = [], spyData = [];
let showOI  = false;
let lwCharts = [];
let tblBuilt = false;

// ════════════════════════════════════════
// KEY DATE FUNCTION
// Polygon weekly bar = Monday 00:00 UTC
// COT report date = Tuesday (CFTC)
// → map BOTH to the Monday of that week
// ════════════════════════════════════════
function toMonday(dateStr) {
  const d   = new Date(dateStr + 'T00:00:00Z');
  const day = d.getUTCDay();                    // 0=Sun 1=Mon … 6=Sat
  const sub = day === 0 ? 6 : day - 1;         // days to subtract to reach Mon
  d.setUTCDate(d.getUTCDate() - sub);
  return d.toISOString().slice(0, 10);
}

// ════════════════════════════════════════
// FETCH
// ════════════════════════════════════════
async function fetchCOT() {
  const url = `${CFTC_URL}?market_and_exchange_names=E-MINI%20S%26P%20500%20-%20CHICAGO%20MERCANTILE%20EXCHANGE&$order=report_date_as_yyyy_mm_dd%20DESC&$limit=${WEEKS}`;
  const r   = await fetch(url);
  if (!r.ok) throw new Error('CFTC HTTP ' + r.status);
  return r.json();
}

async function fetchSPY(from) {
  const to  = new Date().toISOString().slice(0, 10);
  const url = `https://api.polygon.io/v2/aggs/ticker/SPY/range/1/week/${from}/${to}?adjusted=true&sort=asc&limit=500&apiKey=${POLYGON_KEY}`;
  const r   = await fetch(url);
  if (!r.ok) throw new Error('Polygon HTTP ' + r.status);
  const j   = await r.json();
  if (j.status === 'ERROR') throw new Error('Polygon: ' + j.error);
  if (!j.results?.length)   throw new Error('Polygon: no results');
  return j.results;
}

// ════════════════════════════════════════
// PARSE
// ════════════════════════════════════════
const nf = v => parseFloat(v) || 0;

function parseCOT(raw) {
  return raw.map(r => {
    const reportDate = r.report_date_as_yyyy_mm_dd.slice(0, 10);
    const time       = toMonday(reportDate); // ← same function as SPY
    const oi         = nf(r.open_interest_all);
    const entry      = { date: reportDate, time, oi };

    Object.entries(CATS).forEach(([key, cfg]) => {
      const L  = nf(r[cfg.pfxL]);
      const S  = nf(r[cfg.pfxS]);
      const cL = nf(r[cfg.pfxCL]);
      const cS = nf(r[cfg.pfxCS]);
      const pL = nf(r[cfg.pfxPL]);
      const pS = nf(r[cfg.pfxPS]);
      entry[key] = {
        longs: L, shorts: S,
        net:    L  - S,
        chgNet: cL - cS,
        chgL:   cL, chgS: cS,
        pctL: pL, pctS: pS,
        pctNet: (pL - pS).toFixed(1),
      };
    });
    return entry;
  }).sort((a, b) => a.time < b.time ? -1 : 1);
}

function parseSPY(raw, fromDate) {
  return raw
    .map(b => ({
      time:  new Date(b.t).toISOString().slice(0, 10), // Polygon already gives Mon
      open:  +b.o.toFixed(2),
      high:  +b.h.toFixed(2),
      low:   +b.l.toFixed(2),
      close: +b.c.toFixed(2),
    }))
    .filter(b => b.time >= fromDate); // trim to COT range
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
window.onload = async () => {
  buildSidebar();
  const ltxt = document.getElementById('load-txt');
  try {
    ltxt.textContent = 'Fetching COT data...';
    cotData = parseCOT(await fetchCOT());

    const startDate = cotData[0].time; // Monday of oldest COT week

    ltxt.textContent = 'Fetching SPY (Polygon)...';
    try {
      spyData = parseSPY(await fetchSPY(startDate), startDate);
    } catch(e) {
      console.warn('SPY failed:', e.message);
      spyData = [];
    }

    const lastCOT = cotData[cotData.length - 1]?.date || '—';
    const lastSPY = spyData.length ? spyData[spyData.length - 1].time : 'N/A';
    document.getElementById('hdr-status').innerHTML =
      `<span class="dot"></span>COT: ${lastCOT} · SPY: ${lastSPY}`;

    document.getElementById('loading').style.display = 'none';
    renderCharts();

  } catch(e) {
    console.error(e);
    document.getElementById('loading').innerHTML =
      `<div style="color:var(--red);font-family:Syne,sans-serif;font-size:12px;text-align:center;padding:24px">
        <div style="font-size:15px;margin-bottom:8px">⚠ Error</div>${e.message}</div>`;
  }
};

// ════════════════════════════════════════
// TABS
// ════════════════════════════════════════
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    const pg = tab.dataset.page;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + pg).classList.add('active');
    document.getElementById('sidebar').classList.toggle('hidden', pg === 'table');
    if (pg === 'chart')  setTimeout(renderCharts, 30);
    if (pg === 'table' && !tblBuilt && cotData.length) { buildTable(); tblBuilt = true; }
  };
});

// ════════════════════════════════════════
// CHART
// ════════════════════════════════════════
const CHART_BASE = {
  layout:      { background:{color:'#0b0d12'}, textColor:'#475569' },
  grid:        { vertLines:{color:'#161b25'}, horzLines:{color:'#161b25'} },
  crosshair:   { mode:1 },
  timeScale:   { borderColor:'#1e2535', timeVisible:false, rightOffset:4 },
  rightPriceScale: { borderColor:'#1e2535', minimumWidth:70 },
  handleScale:  { mouseWheel:true, pinch:true },
  handleScroll: { mouseWheel:true, pressedMouseMove:true },
};

function activeCats() {
  return Object.entries(CATS).filter(([,c]) => c.active).map(([k]) => k);
}

function metricLabel() {
  return {net:'Net',chgNet:'Chg Net',longs:'Longs',shorts:'Shorts'}
    [document.getElementById('sel-metric').value] || 'Net';
}

function renderCharts() {
  const wrap = document.getElementById('panels-wrap');
  lwCharts.forEach(c => { try { c.remove(); } catch(e){} });
  lwCharts = [];
  wrap.innerHTML = '';

  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  if (!W || !H) { setTimeout(renderCharts, 80); return; }

  const active   = activeCats();
  const subCount = (showOI ? 1 : 0) + active.length;
  const spyH     = Math.max(100, Math.floor(H * (subCount ? 0.50 : 1)));
  const subH     = subCount ? Math.max(70, Math.floor((H - spyH) / subCount)) : 0;

  // ── SPY ──────────────────────────────
  mkPanel(wrap, 'SPY — WEEKLY (E-mini S&P 500 proxy)', '#475569', spyH, el => {
    const chart = LightweightCharts.createChart(el, {...CHART_BASE, width:W, height:spyH});
    const type  = document.getElementById('sel-type').value;
    if (type === 'candle') {
      const s = chart.addCandlestickSeries({
        upColor:'#22c55e', downColor:'#f43f5e',
        borderUpColor:'#22c55e', borderDownColor:'#f43f5e',
        wickUpColor:'#22c55e', wickDownColor:'#f43f5e',
      });
      if (spyData.length) s.setData(spyData);
    } else {
      const s = chart.addLineSeries({color:'#38bdf8', lineWidth:2});
      if (spyData.length) s.setData(spyData.map(d => ({time:d.time, value:d.close})));
    }
    return chart;
  });

  // ── Open Interest ─────────────────────
  if (showOI) {
    mkDivider(wrap);
    mkPanel(wrap, 'OPEN INTEREST', '#fbbf24', subH, el => {
      const chart = LightweightCharts.createChart(el, {...CHART_BASE, width:W, height:subH});
      const s = chart.addLineSeries({color:'#fbbf24', lineWidth:2, priceLineVisible:false, lastValueVisible:true});
      s.setData(cotData.map(d => ({time:d.time, value:d.oi})));
      return chart;
    });
  }

  // ── COT panels ────────────────────────
  const metric = document.getElementById('sel-metric').value;
  const ml     = metricLabel();
  active.forEach(key => {
    const cfg = CATS[key];
    mkDivider(wrap);
    mkPanel(wrap, `${CAT_LABEL[key]} — ${ml}`, cfg.color, subH, el => {
      const chart = LightweightCharts.createChart(el, {...CHART_BASE, width:W, height:subH});
      // zero line
      chart.addLineSeries({color:'#1e2535', lineWidth:1, priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false})
           .setData(cotData.map(d => ({time:d.time, value:0})));
      // data line
      chart.addLineSeries({color:cfg.color, lineWidth:2, priceLineVisible:false, lastValueVisible:true})
           .setData(cotData.map(d => ({time:d.time, value:d[key][metric]})));
      return chart;
    });
  });

  // Sync timescales
  lwCharts.forEach(src => {
    src.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (!range) return;
      lwCharts.forEach(other => { if (other !== src) other.timeScale().setVisibleLogicalRange(range); });
    });
  });
}

function mkPanel(wrap, label, color, h, buildFn) {
  const el = document.createElement('div');
  el.className = 'c-panel';
  el.style.height = h + 'px';
  el.innerHTML = `<div class="c-lbl" style="color:${color}">${label}</div><div class="c-el" style="width:100%;height:100%"></div>`;
  wrap.appendChild(el);
  lwCharts.push(buildFn(el.querySelector('.c-el')));
}

function mkDivider(wrap) {
  const d = document.createElement('div');
  d.className = 'c-divider';
  wrap.appendChild(d);
}

// ════════════════════════════════════════
// SIDEBAR
// ════════════════════════════════════════
function buildSidebar() {
  const sec = document.getElementById('cat-toggles');
  sec.innerHTML = '<div class="s-lbl">Categories</div>';
  Object.entries(CATS).forEach(([key, cfg]) => {
    const row = document.createElement('div');
    row.className = 'tog-row';
    row.innerHTML = `
      <div class="tog-lbl ${cfg.active?'on':''}" id="tl-${key}">
        <div class="cdot" style="background:${cfg.color}"></div>${cfg.label}
      </div>
      <div class="tog-sw ${cfg.active?'on':''}" id="ts-${key}"></div>`;
    row.onclick = () => {
      cfg.active = !cfg.active;
      document.getElementById('ts-'+key).classList.toggle('on', cfg.active);
      document.getElementById('tl-'+key).classList.toggle('on', cfg.active);
      renderCharts();
    };
    sec.appendChild(row);
  });
}

function toggleOI() {
  showOI = !showOI;
  document.getElementById('ts-oi').classList.toggle('on', showOI);
  document.getElementById('tl-oi').classList.toggle('on', showOI);
  renderCharts();
}

// ════════════════════════════════════════
// TABLE
// ════════════════════════════════════════
const MDEF = [
  {key:'net',    label:'Net'},
  {key:'chgNet', label:'Chg Net'},
  {key:'chgL',   label:'Chg Longs'},
  {key:'chgS',   label:'Chg Shorts'},
  {key:'longs',  label:'Longs'},
  {key:'shorts', label:'Shorts'},
];
const fmt = v => (v == null || isNaN(v)) ? '—' : Math.round(v).toLocaleString('ru-RU');
function gradStyle(v) {
  if (!v || v === 0) return '';
  const a = Math.min(0.08 + Math.abs(v)/150000*0.55, 0.63).toFixed(2);
  return v > 0
    ? `background:rgba(56,189,248,${a});color:${Math.abs(v)>70000?'#bae6fd':'#7dd3fc'}`
    : `background:rgba(244,63,94,${a});color:${Math.abs(v)>70000?'#fecdd3':'#fda4af'}`;
}

function buildTable() {
  const keys = Object.keys(CATS);
  let h = `<table><thead><tr>
    <th class="th-base th-sticky" rowspan="2">Date</th>
    <th class="th-base" rowspan="2">Open Interest</th>`;
  keys.forEach(k => {
    const col = CAT_THCOL[k];
    h += `<th class="th-cat" colspan="${MDEF.length+1}" style="background:${col}22;color:${col};border-top:2px solid ${col}55">${CAT_LABEL[k]}</th>`;
  });
  h += '</tr><tr>';
  keys.forEach(k => {
    const col = CAT_THCOL[k];
    MDEF.forEach(m => { h += `<th class="th-m" style="background:${col}14">${m.label}</th>`; });
    h += `<th class="th-m" style="background:${col}14">% OI Net</th>`;
  });
  h += '</tr></thead><tbody>';
  [...cotData].reverse().forEach(d => {
    h += `<tr><td class="td-date">${d.date}</td><td class="td-dim">${fmt(d.oi)}</td>`;
    keys.forEach(k => {
      const c = d[k];
      MDEF.forEach(m => {
        const grad = m.key === 'chgL' || m.key === 'chgS';
        const st   = grad ? gradStyle(c[m.key]) : '';
        h += `<td class="${st?'':'td-dim'}" style="${st}">${fmt(c[m.key])}</td>`;
      });
      h += `<td class="td-dim">${c.pctNet > 0?'+':''}${c.pctNet}%</td>`;
    });
    h += '</tr>';
  });
  h += '</tbody></table>';
  document.getElementById('tbl').innerHTML = h;
}

window.onresize = () => {
  const w = document.getElementById('panels-wrap').clientWidth;
  lwCharts.forEach(c => c.applyOptions({width:w}));
};
</script>
