<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COT Dashboard — ES</title>
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d0f14;
  --surface: #141720;
  --card:    #1a1e2a;
  --border:  #252d3d;
  --border2: #2e3850;
  --text:    #e2e8f0;
  --muted:   #64748b;
  --muted2:  #94a3b8;
  --accent:  #3b82f6;
  --green:   #22c55e;
  --red:     #ef4444;
  --yellow:  #f59e0b;
  --r:       8px;
  --font:    'Inter', sans-serif;
  --mono:    'Roboto Mono', monospace;
  --axis-w:  80px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;overflow:hidden;}
#app{display:flex;flex-direction:column;width:100%;height:100%;}

/* HEADER */
#header{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:44px;background:var(--surface);border-bottom:1px solid var(--border);}
.logo{font-weight:700;font-size:15px;letter-spacing:-.3px;}
.logo em{color:var(--accent);font-style:normal;}
.hdr-mid{font-size:12px;color:var(--muted2);font-weight:500;}
.hdr-mid strong{color:var(--text);}
#hdr-status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0;}
.dot.err{background:var(--red);animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* TOOLBAR */
#toolbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:38px;background:var(--surface);border-bottom:1px solid var(--border);}
.tabs{display:flex;gap:2px;}
.tab{padding:5px 12px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;}
.tab:hover{color:var(--text);}
.tab.active{background:var(--card);color:var(--text);}
.range-group{display:flex;gap:4px;}
.rbtn{padding:4px 10px;border-radius:5px;border:1px solid transparent;font-size:11px;font-weight:600;font-family:var(--mono);cursor:pointer;background:transparent;color:var(--muted);transition:all .15s;}
.rbtn:hover{color:var(--text);}
.rbtn.active{background:var(--card);border-color:var(--border2);color:var(--text);}
.tsep{width:1px;height:20px;background:var(--border);flex-shrink:0;}
.sel{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:11px;font-weight:500;padding:4px 8px;border-radius:5px;cursor:pointer;outline:none;}

/* MAIN */
#main{flex:1 1 0;min-height:0;display:flex;overflow:hidden;}

/* SIDEBAR */
#sidebar{flex:0 0 164px;background:var(--surface);border-right:1px solid var(--border);padding:10px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
#sidebar.hidden{display:none;}
.s-group{display:flex;flex-direction:column;gap:4px;}
.s-lbl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding-bottom:5px;border-bottom:1px solid var(--border);}
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:3px 2px;cursor:pointer;border-radius:4px;transition:background .1s;}
.tog-row:hover{background:var(--card);}
.tog-lbl{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);transition:color .15s;}
.tog-lbl.on{color:var(--text);}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sw{width:28px;height:14px;background:var(--border);border-radius:7px;position:relative;transition:background .2s;flex-shrink:0;}
.sw::after{content:'';position:absolute;left:2px;top:2px;width:10px;height:10px;border-radius:50%;background:var(--muted);transition:all .2s;}
.sw.on{background:rgba(59,130,246,.3);}
.sw.on::after{left:16px;background:var(--accent);}

/* VIEWPORT */
#viewport{flex:1 1 0;min-width:0;overflow:hidden;display:flex;flex-direction:column;padding:10px;gap:8px;}
.page{display:none;flex-direction:column;flex:1 1 0;min-height:0;gap:8px;}
.page.active{display:flex;}

/* CARDS */
#cards{flex:0 0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;flex-direction:column;gap:5px;}
.card-lbl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-val{font-size:22px;font-weight:700;line-height:1;letter-spacing:-.5px;font-family:var(--mono);}
.card-val.green{color:var(--green);}
.card-val.red{color:var(--red);}
.card-val.white{color:var(--text);}
.card-chg{font-size:11px;color:var(--muted);}
.card-chg .up{color:var(--green);font-weight:600;}
.card-chg .dn{color:var(--red);font-weight:600;}

/* CHART CARD */
#chart-card{flex:1 1 0;min-height:0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;position:relative;}

/* SPLIT */
#split-wrap{position:absolute;inset:0;}
#price-pane{position:absolute;top:0;left:0;right:0;overflow:hidden;}
#price-lbl{position:absolute;top:7px;left:10px;z-index:5;font-size:10px;font-weight:600;color:var(--muted2);letter-spacing:.3px;pointer-events:none;text-transform:uppercase;}
#divider{position:absolute;left:0;right:0;height:4px;background:var(--border);cursor:ns-resize;z-index:10;transition:background .15s;}
#divider:hover,#divider.dragging{background:var(--accent);}
#cot-pane{position:absolute;left:0;right:0;bottom:0;overflow:hidden;display:flex;flex-direction:column;}
#cot-panels{flex:1 1 0;min-height:0;overflow:hidden;display:flex;flex-direction:column;}
.c-sub-div{flex:0 0 1px;background:var(--border);flex-shrink:0;}
.c-wrap{position:relative;overflow:hidden;}
.c-lbl{position:absolute;top:6px;left:10px;z-index:5;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;pointer-events:none;}

/* LOADING */
#loading{position:absolute;inset:0;z-index:50;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-msg{font-size:12px;color:var(--muted);font-weight:500;}

/* TABLE */
#page-table{overflow:hidden;}
.tbl-card{flex:1 1 0;min-height:0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:auto;padding:12px 14px;}
table{border-collapse:collapse;width:max-content;font-size:11px;}
thead tr:first-child th{position:sticky;top:0;z-index:6;}
thead tr:last-child th{position:sticky;top:29px;z-index:5;}
.th-base{background:var(--card);color:var(--text);font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;padding:7px 10px;text-align:center;border:1px solid var(--border);}
.th-sticky{position:sticky;left:0;z-index:9!important;}
.th-cat{font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;padding:7px 10px;text-align:center;border:1px solid rgba(255,255,255,.04);}
.th-m{font-size:8px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;padding:4px 8px;text-align:center;border:1px solid rgba(255,255,255,.04);color:var(--muted);white-space:nowrap;}
td{padding:4px 9px;text-align:right;border:1px solid var(--border);white-space:nowrap;font-variant-numeric:tabular-nums;font-family:var(--mono);font-size:11px;}
.td-date{text-align:center;position:sticky;left:0;z-index:2;background:var(--card);color:var(--muted2);border-right:2px solid var(--border);}
.td-dim{color:var(--muted);}
tr:nth-child(even) td{background:rgba(255,255,255,.015);}
tr:nth-child(even) .td-date{background:var(--card);}
tr:hover td{background:rgba(59,130,246,.06)!important;}
tr:hover .td-date{background:var(--card)!important;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo">COT<em>/</em>ES</div>
    <div class="hdr-mid"><strong>E-MINI S&amp;P 500</strong> · Chicago Mercantile Exchange</div>
    <div id="hdr-status"><div class="dot" id="sdot"></div><span id="stxt">Loading…</span></div>
  </div>
  <div id="toolbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="tabs">
        <div class="tab active" data-page="chart">Chart</div>
        <div class="tab" data-page="table">Table</div>
      </div>
      <div class="tsep"></div>
      <select class="sel" id="sel-type" onchange="renderCharts()">
        <option value="candle">Candlestick</option>
        <option value="line">Line</option>
      </select>
      <div class="tsep"></div>
      <select class="sel" id="sel-metric" onchange="renderCharts()">
        <option value="net">Net (L − S)</option>
        <option value="chgNet">Chg Net</option>
        <option value="longs">Longs</option>
        <option value="shorts">Shorts</option>
      </select>
    </div>
    <div class="range-group" id="range-btns">
      <button class="rbtn" data-range="ytd">YTD</button>
      <button class="rbtn" data-range="1">1Y</button>
      <button class="rbtn" data-range="2">2Y</button>
      <button class="rbtn active" data-range="3">3Y</button>
    </div>
  </div>
  <div id="main">
    <div id="sidebar">
      <div class="s-group">
        <div class="s-lbl">Categories</div>
        <div id="cat-toggles"></div>
      </div>
      <div class="s-group">
        <div class="s-lbl">Extra</div>
        <div class="tog-row" onclick="toggleOI()">
          <div class="tog-lbl" id="tl-oi"><div class="cdot" style="background:#f59e0b"></div>Open Interest</div>
          <div class="sw" id="ts-oi"></div>
        </div>
      </div>
    </div>
    <div id="viewport">
      <div id="loading">
        <div class="spinner"></div>
        <div class="load-msg" id="load-txt">Initializing…</div>
      </div>
      <!-- CHART PAGE -->
      <div class="page active" id="page-chart">
        <div id="cards">
          <div class="card">
            <div class="card-lbl">Open Interest</div>
            <div class="card-val white" id="cv-oi">—</div>
            <div class="card-chg" id="cc-oi">—</div>
          </div>
          <div class="card">
            <div class="card-lbl" id="lbl-nl">Net Long</div>
            <div class="card-val green" id="cv-nl">—</div>
            <div class="card-chg" id="cc-nl">—</div>
          </div>
          <div class="card">
            <div class="card-lbl" id="lbl-ns">Net Short</div>
            <div class="card-val red" id="cv-ns">—</div>
            <div class="card-chg" id="cc-ns">—</div>
          </div>
          <div class="card">
            <div class="card-lbl" id="lbl-np">Net Position</div>
            <div class="card-val" id="cv-np">—</div>
            <div class="card-chg" id="cc-np">—</div>
          </div>
        </div>
        <div id="chart-card">
          <div id="split-wrap">
            <div id="price-pane"><div id="price-lbl">ES · Weekly</div></div>
            <div id="divider"></div>
            <div id="cot-pane"><div id="cot-panels"></div></div>
          </div>
        </div>
      </div>
      <!-- TABLE PAGE -->
      <div class="page" id="page-table">
        <div class="tbl-card"><div id="tbl"></div></div>
      </div>
    </div>
  </div>
</div>
<script>
// ═══════════════════════════════════
// CONFIG
// ═══════════════════════════════════
const CFTC_URL  = 'https://publicreporting.cftc.gov/resource/gpe5-46if.json';
const MAX_WEEKS = 156;
const AXIS_W    = 80; // одинаковая ширина оси для всех графиков → сетка совпадает

const CATS = {
  dealer:   { label:'Dealer / Intermediary', short:'Dealer',    color:'#3b82f6',
    pfxL:'dealer_positions_long_all',   pfxS:'dealer_positions_short_all',
    pfxCL:'change_in_dealer_long_all',  pfxCS:'change_in_dealer_short_all', active:true },
  assetmgr: { label:'Asset Manager / Inst.', short:'Asset Mgr', color:'#22c55e',
    pfxL:'asset_mgr_positions_long',    pfxS:'asset_mgr_positions_short',
    pfxCL:'change_in_asset_mgr_long',   pfxCS:'change_in_asset_mgr_short',  active:true },
  levfunds: { label:'Leveraged Funds',       short:'Lev Funds', color:'#a78bfa',
    pfxL:'lev_money_positions_long',    pfxS:'lev_money_positions_short',
    pfxCL:'change_in_lev_money_long',   pfxCS:'change_in_lev_money_short',  active:true },
  other:    { label:'Other Reportable',      short:'Other Rept',color:'#fb923c',
    pfxL:'other_rept_positions_long',   pfxS:'other_rept_positions_short',
    pfxCL:'change_in_other_rept_long',  pfxCS:'change_in_other_rept_short', active:false },
  nonrept:  { label:'Non-Reportable',        short:'Non-Rept',  color:'#94a3b8',
    pfxL:'nonrept_positions_long_all',  pfxS:'nonrept_positions_short_all',
    pfxCL:'change_in_nonrept_long_all', pfxCS:'change_in_nonrept_short_all',active:false },
};
const CAT_THCOL = { dealer:'#1d4ed8', assetmgr:'#15803d', levfunds:'#7c3aed', other:'#c2410c', nonrept:'#475569' };

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let cotData=[], priceData=[];
let showOI=false, lwCharts=[], priceChart=null;
let tblBuilt=false, activeRange='3';
let splitRatio=0.45, isDragging=false;

// ═══════════════════════════════════
// HELPERS
// ═══════════════════════════════════
function toFriday(s) {
  const d=new Date(s+'T00:00:00Z'), day=d.getUTCDay();
  d.setUTCDate(d.getUTCDate()+(day<=5?5-day:6));
  return d.toISOString().slice(0,10);
}
function rangeStart() {
  if (activeRange==='ytd') return new Date().getUTCFullYear()+'-01-01';
  const d=new Date(); d.setUTCFullYear(d.getUTCFullYear()-parseInt(activeRange));
  return d.toISOString().slice(0,10);
}
const today=()=>new Date().toISOString().slice(0,10);
function fmtK(v){const a=Math.abs(v);return a>=1e6?(v/1e6).toFixed(2)+'M':a>=1e3?(v/1e3).toFixed(1)+'K':Math.round(v).toString();}
function axisFmt(v){const a=Math.abs(v);return a>=1e6?(v/1e6).toFixed(1)+'M':a>=1e3?(v/1e3).toFixed(0)+'K':Math.round(v).toString();}
const nf=v=>parseFloat(v)||0;

// ═══════════════════════════════════
// FETCH
// ═══════════════════════════════════
async function fetchCOT() {
  const url=`${CFTC_URL}?market_and_exchange_names=E-MINI%20S%26P%20500%20-%20CHICAGO%20MERCANTILE%20EXCHANGE&$order=report_date_as_yyyy_mm_dd%20DESC&$limit=${MAX_WEEKS}`;
  const r=await fetch(url); if(!r.ok) throw new Error('CFTC '+r.status); return r.json();
}
async function fetchPrice() {
  const now=Math.floor(Date.now()/1000);
  const from=Math.floor((Date.now()-3*365.25*24*3600*1000)/1000);
  const yUrl=`https://query1.finance.yahoo.com/v8/finance/chart/ES%3DF?interval=1wk&period1=${from}&period2=${now}&events=history`;
  const proxies=[
    u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
    u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
    u=>`https://thingproxy.freeboard.io/fetch/${u}`,
  ];
  for(const mk of proxies){
    try{
      const r=await fetch(mk(yUrl),{signal:AbortSignal.timeout(8000)});
      if(!r.ok) continue;
      const txt=await r.text(); let j; try{j=JSON.parse(txt);}catch{continue;}
      if(j.contents){try{j=JSON.parse(j.contents);}catch{continue;}}
      const res=j?.chart?.result?.[0]; if(res) return res;
    }catch(e){}
  }
  throw new Error('All price proxies failed');
}

// ═══════════════════════════════════
// PARSE
// ═══════════════════════════════════
function parseCOT(raw){
  return raw.map(r=>{
    const date=r.report_date_as_yyyy_mm_dd.slice(0,10);
    const time=toFriday(date), oi=nf(r.open_interest_all);
    const e={date,time,oi};
    Object.entries(CATS).forEach(([k,cfg])=>{
      const L=nf(r[cfg.pfxL]),S=nf(r[cfg.pfxS]),cL=nf(r[cfg.pfxCL]),cS=nf(r[cfg.pfxCS]);
      e[k]={longs:L,shorts:S,net:L-S,chgNet:cL-cS,chgL:cL,chgS:cS,pctNet:((L-S)/(oi||1)*100).toFixed(1)};
    });
    return e;
  }).sort((a,b)=>a.time<b.time?-1:1);
}
function parsePrice(res){
  const ts=res.timestamp,q=res.indicators.quote[0],td=today();
  return ts.map((t,i)=>{
    const mon=new Date(t*1000).toISOString().slice(0,10);
    const d=new Date(mon+'T00:00:00Z'); d.setUTCDate(d.getUTCDate()+4);
    return{time:d.toISOString().slice(0,10),open:+(q.open[i]||0).toFixed(2),high:+(q.high[i]||0).toFixed(2),low:+(q.low[i]||0).toFixed(2),close:+(q.close[i]||0).toFixed(2)};
  }).filter(b=>b.open&&b.high&&b.low&&b.close&&b.time<=td);
}
function filteredData(){const s=rangeStart();return{cot:cotData.filter(d=>d.time>=s),price:priceData.filter(d=>d.time>=s)};}

// ═══════════════════════════════════
// CARDS
// ═══════════════════════════════════
function updateCards(){
  const{cot}=filteredData(); if(!cot.length) return;
  const last=cot[cot.length-1],prev=cot[cot.length-2]||last;
  const active=Object.keys(CATS).filter(k=>CATS[k].active);
  const oiChg=last.oi-prev.oi;
  document.getElementById('cv-oi').textContent=fmtK(last.oi);
  document.getElementById('cc-oi').innerHTML=`<span class="${oiChg>=0?'up':'dn'}">${oiChg>=0?'+':''}${fmtK(oiChg)}</span> vs prev`;
  let tL=0,tS=0,pL=0,pS=0;
  active.forEach(k=>{tL+=last[k].longs;tS+=last[k].shorts;pL+=prev[k].longs;pS+=prev[k].shorts;});
  const np=tL-tS,npChg=np-(pL-pS),sfx=active.length?' · '+active.map(k=>CATS[k].short).join(', '):'';
  document.getElementById('lbl-nl').textContent='Net Long'+sfx;
  document.getElementById('lbl-ns').textContent='Net Short'+sfx;
  document.getElementById('lbl-np').textContent='Net Position'+sfx;
  document.getElementById('cv-nl').textContent=fmtK(tL);
  document.getElementById('cc-nl').innerHTML=`<span class="${tL-pL>=0?'up':'dn'}">${tL-pL>=0?'+':''}${fmtK(tL-pL)}</span> vs prev`;
  document.getElementById('cv-ns').textContent=fmtK(tS);
  document.getElementById('cc-ns').innerHTML=`<span class="${tS-pS>=0?'dn':'up'}">${tS-pS>=0?'+':''}${fmtK(tS-pS)}</span> vs prev`;
  const npEl=document.getElementById('cv-np');
  npEl.textContent=(np>=0?'+':'')+fmtK(np);
  npEl.className='card-val '+(np>=0?'green':'red');
  document.getElementById('cc-np').innerHTML=`<span class="${npChg>=0?'up':'dn'}">${npChg>=0?'+':''}${fmtK(npChg)}</span> vs prev`;
}

// ═══════════════════════════════════
// CHART BASE
// ═══════════════════════════════════
const BASE={
  layout:{background:{color:'transparent'},textColor:'#64748b'},
  grid:{vertLines:{color:'#1e2330'},horzLines:{color:'#1e2330'}},
  crosshair:{mode:1},
  timeScale:{borderColor:'#252d3d',timeVisible:false,rightOffset:3,visible:true},
  rightPriceScale:{borderColor:'#252d3d',minimumWidth:AXIS_W,scaleMargins:{top:.08,bottom:.08}},
  handleScale:{mouseWheel:true,pinch:true},
  handleScroll:{mouseWheel:true,pressedMouseMove:true},
};
const BASE_NT={...BASE,timeScale:{...BASE.timeScale,visible:false}};
const COT_FMT={type:'custom',formatter:axisFmt,minMove:1};

// ═══════════════════════════════════
// POSITIONS
// ═══════════════════════════════════
function applyPos(totalH,priceH){
  document.getElementById('price-pane').style.height=priceH+'px';
  document.getElementById('divider').style.top=priceH+'px';
  const cotH=Math.max(60,totalH-priceH-4);
  document.getElementById('cot-pane').style.top=(priceH+4)+'px';
  document.getElementById('cot-pane').style.height=cotH+'px';
  return cotH;
}

// ═══════════════════════════════════
// RENDER
// ═══════════════════════════════════
function activeCatKeys(){return Object.entries(CATS).filter(([,c])=>c.active).map(([k])=>k);}

function renderCharts(){
  const sw=document.getElementById('split-wrap');
  const cotEl=document.getElementById('cot-panels');
  const totalH=sw.clientHeight, W=sw.clientWidth;
  if(!W||!totalH){setTimeout(renderCharts,80);return;}

  const priceH=Math.max(80,Math.floor(totalH*splitRatio));
  const cotH=applyPos(totalH,priceH);

  lwCharts.forEach(c=>{try{c.remove();}catch(e){}});
  lwCharts=[];priceChart=null;cotEl.innerHTML='';

  const{cot,price}=filteredData();
  const active=activeCatKeys(), metric=document.getElementById('sel-metric').value;
  const panelCount=active.length+(showOI?1:0);

  // Price
  {
    const pp=document.getElementById('price-pane');
    const old=pp.querySelector('.cel'); if(old) old.remove();
    const el=document.createElement('div');
    el.className='cel'; el.style.cssText=`width:100%;height:${priceH}px;`;
    pp.appendChild(el);
    const cfg=panelCount>0?BASE_NT:BASE;
    const chart=LightweightCharts.createChart(el,{...cfg,width:W,height:priceH});
    priceChart=chart;
    if(document.getElementById('sel-type').value==='candle'){
      chart.addCandlestickSeries({upColor:'#22c55e',downColor:'#ef4444',borderUpColor:'#22c55e',borderDownColor:'#ef4444',wickUpColor:'#22c55e',wickDownColor:'#ef4444'})
           .setData(price.length?price:[]);
    } else {
      chart.addLineSeries({color:'#3b82f6',lineWidth:2}).setData(price.length?price.map(d=>({time:d.time,value:d.close})):[]);
    }
    lwCharts.push(chart);
  }

  if(panelCount===0){updateCards();return;}
  const subH=Math.max(50,Math.floor(cotH/panelCount));
  let idx=0;

  if(showOI){
    const isLast=idx===panelCount-1;
    const w=mkWrap(cotEl,'Open Interest','#f59e0b',subH);
    const chart=LightweightCharts.createChart(w.el,{...(isLast?BASE:BASE_NT),width:W,height:subH});
    chart.addLineSeries({color:'#f59e0b',lineWidth:2,priceLineVisible:false,lastValueVisible:true,priceFormat:COT_FMT})
         .setData(cot.map(d=>({time:d.time,value:d.oi})));
    lwCharts.push(chart); idx++;
    if(active.length) cotEl.appendChild(mkDiv());
  }

  active.forEach((key,i)=>{
    const cfg=CATS[key], isLast=idx===panelCount-1;
    const w=mkWrap(cotEl,cfg.label,cfg.color,subH);
    const chart=LightweightCharts.createChart(w.el,{...(isLast?BASE:BASE_NT),width:W,height:subH});
    // zero
    chart.addLineSeries({color:'#252d3d',lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false})
         .setData(cot.map(d=>({time:d.time,value:0})));
    if(metric==='chgNet'){
      chart.addHistogramSeries({priceLineVisible:false,lastValueVisible:true,priceFormat:COT_FMT})
           .setData(cot.map(d=>({time:d.time,value:d[key][metric],color:d[key][metric]>=0?cfg.color:'#ef4444'})));
    } else {
      chart.addLineSeries({color:cfg.color,lineWidth:2,priceLineVisible:false,lastValueVisible:true,priceFormat:COT_FMT})
           .setData(cot.map(d=>({time:d.time,value:d[key][metric]})));
    }
    lwCharts.push(chart); idx++;
    if(i<active.length-1) cotEl.appendChild(mkDiv());
  });

  // Sync
  lwCharts.forEach(src=>{
    src.timeScale().subscribeVisibleLogicalRangeChange(range=>{
      if(!range) return;
      lwCharts.forEach(o=>{if(o!==src) o.timeScale().setVisibleLogicalRange(range);});
    });
  });
  updateCards();
}

function mkWrap(parent,label,color,h){
  const wrap=document.createElement('div');
  wrap.className='c-wrap'; wrap.style.height=h+'px';
  const lbl=document.createElement('div');
  lbl.className='c-lbl'; lbl.style.color=color; lbl.textContent=label;
  const el=document.createElement('div'); el.style.cssText=`width:100%;height:${h}px;`;
  wrap.appendChild(lbl); wrap.appendChild(el); parent.appendChild(wrap);
  return{wrap,el};
}
function mkDiv(){const d=document.createElement('div');d.className='c-sub-div';return d;}

// ═══════════════════════════════════
// SPLIT DRAG
// ═══════════════════════════════════
(function(){
  const div=document.getElementById('divider');
  const sw=document.getElementById('split-wrap');
  div.addEventListener('mousedown',e=>{isDragging=true;div.classList.add('dragging');e.preventDefault();});
  document.addEventListener('mousemove',e=>{
    if(!isDragging) return;
    const rect=sw.getBoundingClientRect(),totalH=sw.clientHeight,W=sw.clientWidth;
    splitRatio=Math.min(.85,Math.max(.15,(e.clientY-rect.top)/totalH));
    const pH=Math.max(80,Math.floor(totalH*splitRatio));
    applyPos(totalH,pH);
    if(priceChart) priceChart.applyOptions({width:W,height:pH});
  });
  document.addEventListener('mouseup',()=>{if(!isDragging)return;isDragging=false;document.getElementById('divider').classList.remove('dragging');renderCharts();});
})();

// ═══════════════════════════════════
// SIDEBAR / TABS / RANGE
// ═══════════════════════════════════
function buildSidebar(){
  const sec=document.getElementById('cat-toggles'); sec.innerHTML='';
  Object.entries(CATS).forEach(([key,cfg])=>{
    const row=document.createElement('div'); row.className='tog-row';
    row.innerHTML=`<div class="tog-lbl ${cfg.active?'on':''}" id="tl-${key}"><div class="cdot" style="background:${cfg.color}"></div>${cfg.short}</div><div class="sw ${cfg.active?'on':''}" id="ts-${key}"></div>`;
    row.onclick=()=>{cfg.active=!cfg.active;document.getElementById('ts-'+key).classList.toggle('on',cfg.active);document.getElementById('tl-'+key).classList.toggle('on',cfg.active);renderCharts();};
    sec.appendChild(row);
  });
}
function toggleOI(){showOI=!showOI;document.getElementById('ts-oi').classList.toggle('on',showOI);document.getElementById('tl-oi').classList.toggle('on',showOI);renderCharts();}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick=()=>{
    const pg=tab.dataset.page;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+pg).classList.add('active');
    document.getElementById('sidebar').classList.toggle('hidden',pg==='table');
    document.getElementById('range-btns').style.display=pg==='table'?'none':'';
    if(pg==='chart') setTimeout(renderCharts,30);
    if(pg==='table'&&!tblBuilt&&cotData.length){buildTable();tblBuilt=true;}
  };
});

document.querySelectorAll('.rbtn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.rbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); activeRange=btn.dataset.range; tblBuilt=false; renderCharts();
  };
});

// ═══════════════════════════════════
// TABLE
// ═══════════════════════════════════
const MDEF=[{key:'net',label:'Net'},{key:'chgNet',label:'Chg Net'},{key:'chgL',label:'Chg L'},{key:'chgS',label:'Chg S'},{key:'longs',label:'Longs'},{key:'shorts',label:'Shorts'},{key:'pctNet',label:'% Net'}];
const fmt=v=>v==null||isNaN(v)?'—':Math.round(v).toLocaleString('ru-RU');
function gradStyle(v){if(!v||v===0)return'';const a=Math.min(0.08+Math.abs(v)/150000*.5,.6).toFixed(2);return v>0?`background:rgba(59,130,246,${a});color:#93c5fd`:`background:rgba(239,68,68,${a});color:#fca5a5`;}
function buildTable(){
  const{cot}=filteredData(); const keys=Object.keys(CATS);
  let h=`<table><thead><tr><th class="th-base th-sticky" rowspan="2">Date</th><th class="th-base" rowspan="2">Open Int.</th>`;
  keys.forEach(k=>{const col=CAT_THCOL[k];h+=`<th class="th-cat" colspan="${MDEF.length}" style="background:${col}22;color:${col};border-top:2px solid ${col}55">${CATS[k].short.toUpperCase()}</th>`;});
  h+='</tr><tr>';
  keys.forEach(k=>{const col=CAT_THCOL[k];MDEF.forEach(m=>{h+=`<th class="th-m" style="background:${col}14">${m.label}</th>`;});});
  h+='</tr></thead><tbody>';
  [...cot].reverse().forEach(d=>{
    h+=`<tr><td class="td-date">${d.date}</td><td class="td-dim">${fmtK(d.oi)}</td>`;
    keys.forEach(k=>{
      const c=d[k];
      MDEF.forEach(m=>{
        if(m.key==='pctNet'){h+=`<td class="td-dim">${c.pctNet>0?'+':''}${c.pctNet}%</td>`;}
        else{const grad=['chgL','chgS','chgNet'].includes(m.key);const st=grad?gradStyle(c[m.key]):'';h+=`<td class="${st?'':'td-dim'}" style="${st}">${fmt(c[m.key])}</td>`;}
      });
    });
    h+='</tr>';
  });
  h+='</tbody></table>';
  document.getElementById('tbl').innerHTML=h;
}

window.onresize=()=>{const w=document.getElementById('split-wrap').clientWidth;lwCharts.forEach(c=>c.applyOptions({width:w}));};

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
window.onload=async()=>{
  buildSidebar();
  const ltxt=document.getElementById('load-txt');
  try{
    ltxt.textContent='Fetching COT data (CFTC)…';
    cotData=parseCOT(await fetchCOT());
    ltxt.textContent='Fetching ES price (Yahoo Finance)…';
    try{priceData=parsePrice(await fetchPrice());}
    catch(e){console.warn('Price:',e.message);priceData=[];document.getElementById('sdot').classList.add('err');}
    const lc=cotData[cotData.length-1]?.date||'—', lp=priceData.length?priceData[priceData.length-1].time:'N/A';
    document.getElementById('stxt').textContent=`COT: ${lc}  ·  ES: ${lp}`;
    document.getElementById('loading').style.display='none';
    renderCharts();
  }catch(e){
    console.error(e);
    document.getElementById('loading').innerHTML=`<div style="color:#ef4444;font-size:13px;text-align:center;padding:24px"><div style="font-size:16px;margin-bottom:8px">⚠ Error</div>${e.message}</div>`;
  }
};
